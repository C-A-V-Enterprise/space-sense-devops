version: '3.8'

services:
  rm564662-oracle-db:
    image: gvenzl/oracle-xe:latest
    container_name: rm564662-oracle-db
    environment:
      ORACLE_PASSWORD: "020207"
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    restart: unless-stopped

  rm564662-space-sense-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rm564662-space-sense-api
    depends_on:
      - rm564662-oracle-db
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  oracle_data:

